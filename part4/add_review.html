<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="hbnb-header">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <!-- logo -->
            <div class="logo-container">
                <a href="index.html"><img src="images/logo_option1.svg" alt="HBnB Logo" class="logo"></a>
            </div>
            <!-- nav -->
            <nav class="d-flex align-items-center gap-3">
                <a href="index.html" class="nav-link-custom">Home</a>
                <div class="dropdown" id="user-dropdown" style="display:none;">
                    <span id="user-name" class="nav-user-name dropdown-toggle" data-bs-toggle="dropdown" role="button"></span>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" id="logout-btn">Logout</a></li>
                    </ul>
                </div>
                <a id="login-link" href="login.html" class="btn btn-login login-button">Login</a>
            </nav>
        </div>
    </header>
    <!-- Main -->
    <main class="container my-5">
        <!-- Back button -->
        <div class="mb-4">
            <a href="place.html" class="btn btn-outline-secondary btn-sm">
                ← Back to Place
            </a>
        </div>
        <!-- Add Review Card -->
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="review-card add-review">
                    <h2 class="mb-1">Add a Review</h2>
                    <p class="text-muted mb-4">Share your experience with other travelers</p>
                    <!-- Form -->
                    <form id="review-form" class="form">
                        <!-- Rating -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Rating</label>
                            <div class="star-rating d-flex gap-2">
                                <input type="radio" id="star5" name="rating" value="5" required>
                                <label for="star5" class="star-label" title="5 stars">★</label>
                                <input type="radio" id="star4" name="rating" value="4">
                                <label for="star4" class="star-label" title="4 stars">★</label>
                                <input type="radio" id="star3" name="rating" value="3">
                                <label for="star3" class="star-label" title="3 stars">★</label>
                                <input type="radio" id="star2" name="rating" value="2">
                                <label for="star2" class="star-label" title="2 stars">★</label>
                                <input type="radio" id="star1" name="rating" value="1">
                                <label for="star1" class="star-label" title="1 star">★</label>
                            </div>
                            <div id="rating-error" class="text-danger small mt-1 d-none">
                                Please select a rating.
                            </div>
                        </div>
                        <!-- Review text -->
                        <div class="mb-4">
                            <label for="review-text" class="form-label fw-semibold">Your Review</label>
                            <textarea
                                id="review-text"
                                name="review-text"
                                class="form-control"
                                rows="5"
                                placeholder="Describe your experience..."
                                required
                                minlength="10"
                            ></textarea>
                            <div class="form-text">Minimum 10 characters.</div>
                        </div>
                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary-custom btn-lg">
                                Submit Review
                            </button>
                        </div>
                        <!-- Success / Error messages -->
                        <div id="success-msg" class="alert alert-success mt-3 d-none">
                            Review submitted successfully!
                        </div>
                        <div id="error-msg" class="alert alert-danger mt-3 d-none">
                            An error occurred. Please try again.
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>
    <!-- Footer -->
    <footer class="hbnb-footer">
        <div class="container text-center py-3">
            <p class="mb-0">All rights reserved © 2026 HBnB</p>
        </div>
    </footer>
    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/common.js"></script>
    <script src="JS/add_review.js"></script>
</body>
</html>
