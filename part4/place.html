<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="hbnb-header">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <!-- logo -->
            <div class="logo-container">
                <a href="index.html"><img src="images/logo_option1.svg" alt="HBnB Logo" class="logo" width="120" height="40"></a>
            </div>
            <!-- nav -->
            <nav class="d-flex align-items-center gap-3">
                <a href="index.html" class="nav-link-custom">Home</a>
                <div class="dropdown" id="user-dropdown" style="display:none;">
                    <span id="user-name" class="nav-user-name dropdown-toggle" data-bs-toggle="dropdown" role="button"></span>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" id="logout-btn">Logout</a></li>
                    </ul>
                </div>
                <!-- Task 3: id="login-link" to show/hide based on authentication -->
                <a id="login-link" href="login.html" class="btn btn-login login-button">Login</a>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="container">
        <!-- Back button -->
        <div class="mb-4 mt-4">
            <a href="index.html" class="btn btn-outline-secondary btn-sm">
                ← Back to Home
            </a>
        </div>
        <!-- Task 3: empty, filled dynamically by JavaScript -->
        <!-- Place info -->
        <div id="place-details" class="place-details mb-4">
            <div class="place-info"></div>
        </div>
        <!-- Gallery — filled dynamically by JavaScript -->
        <div id="place-gallery" class="mb-4"></div>

        <!-- Task 3: empty, filled dynamically by JavaScript -->
        <!-- Reviews -->
        <div id="reviews" class="mb-4">
            <h3 class="mb-3">Reviews</h3>
        </div>
        <!-- Task 3: hidden by default, shown only if authenticated -->
        <!-- Add review -->
        <div id="add-review" class="add-review" style="display: none;">
            <h3>Add a Review</h3>
            <!-- Form -->
            <a id="add-review-link" href="add_review.html" class="btn-primary-custom btn">
                Add a Review
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="hbnb-footer">
        <div class="container text-center py-3">
            <p class="mb-0">All rights reserved © 2026 HBnB</p>
        </div>
    </footer>
    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" style="display:none;">
        <span id="lightbox-close" class="lightbox-close">&times;</span>
        <img id="lightbox-img" class="lightbox-img" src="" alt="">
    </div>

    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="JS/common.js"></script>
    <script src="JS/place.js"></script>
</body>
</html>
